version: '3.8'

services:
  bot:
    build: .
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dndbot}:${POSTGRES_PASSWORD:-dndbotpassword}@postgres:5432/${POSTGRES_DB:-dndscheduler}
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dndbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dndbotpassword}
      POSTGRES_DB: ${POSTGRES_DB:-dndscheduler}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dndbot} -d ${POSTGRES_DB:-dndscheduler}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
